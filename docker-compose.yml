services:
  nginx:
    image: nginx:1.27-alpine
    container_name: normchat-nginx
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
    depends_on:
      app:
        condition: service_started
      reverb:
        condition: service_started
    ports:
      - "127.0.0.1:8082:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/up || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: normchat-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - normchat_storage:/opt/normchat/storage
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-https://normchat.technocrats.studio}
      APP_KEY: ${APP_KEY}
      MARKETING_URL: ${MARKETING_URL:-https://normchat.technocrats.studio}
      NORMCHAT_APP_URL: ${NORMCHAT_APP_URL:-https://normchat.technocrats.studio}
      NORMCHAT_MARKETING_PATH: ${NORMCHAT_MARKETING_PATH:-/normchat}
      DB_CONNECTION: pgsql
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-normchat}
      DB_USERNAME: ${DB_USERNAME:-normchat}
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-true}
      CACHE_STORE: ${CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-reverb}
      REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_QUEUE: ${REDIS_QUEUE:-default}
      REDIS_QUEUE_CONNECTION: ${REDIS_QUEUE_CONNECTION:-default}
      NORMCHAT_STORAGE_ROOT: ${NORMCHAT_STORAGE_ROOT:-/opt/normchat/storage}
      REVERB_APP_ID: ${REVERB_APP_ID:-normchat}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-normchat-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: ${REVERB_HOST:-reverb}
      REVERB_PORT: ${REVERB_PORT:-8080}
      REVERB_SCHEME: ${REVERB_SCHEME:-http}
      REVERB_SERVER_HOST: ${REVERB_SERVER_HOST:-0.0.0.0}
      REVERB_SERVER_PORT: ${REVERB_SERVER_PORT:-8080}
      VITE_REVERB_APP_KEY: ${VITE_REVERB_APP_KEY:-normchat-key}
      VITE_REVERB_HOST: ${VITE_REVERB_HOST:-normchat.technocrats.studio}
      VITE_REVERB_PORT: ${VITE_REVERB_PORT:-443}
      VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME:-https}
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-normchat_attachments}
      TRAKTEER_WEBHOOK_TOKEN: ${TRAKTEER_WEBHOOK_TOKEN:-}
      TRAKTEER_PAGE_URL: ${TRAKTEER_PAGE_URL:-https://trakteer.id/normchat}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "
        php artisan migrate --force &&
        php artisan config:cache &&
        php artisan route:cache &&
        php artisan view:cache &&
        php artisan storage:link --force 2>/dev/null || true &&
        php-fpm
      "

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: normchat-queue
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - normchat_storage:/opt/normchat/storage
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-https://normchat.technocrats.studio}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-normchat}
      DB_USERNAME: ${DB_USERNAME:-normchat}
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      CACHE_STORE: ${CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-reverb}
      REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_QUEUE: ${REDIS_QUEUE:-default}
      REDIS_QUEUE_CONNECTION: ${REDIS_QUEUE_CONNECTION:-default}
      NORMCHAT_STORAGE_ROOT: ${NORMCHAT_STORAGE_ROOT:-/opt/normchat/storage}
      REVERB_APP_ID: ${REVERB_APP_ID:-normchat}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-normchat-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: ${REVERB_HOST:-reverb}
      REVERB_PORT: ${REVERB_PORT:-8080}
      REVERB_SCHEME: ${REVERB_SCHEME:-http}
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-normchat_attachments}
      TRAKTEER_WEBHOOK_TOKEN: ${TRAKTEER_WEBHOOK_TOKEN:-}
      TRAKTEER_PAGE_URL: ${TRAKTEER_PAGE_URL:-https://trakteer.id/normchat}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: php artisan queue:work redis --queue=default --tries=3 --sleep=1 --max-time=3600

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: normchat-reverb
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - normchat_storage:/opt/normchat/storage
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-https://normchat.technocrats.studio}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-normchat}
      DB_USERNAME: ${DB_USERNAME:-normchat}
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      CACHE_STORE: ${CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-reverb}
      REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      NORMCHAT_STORAGE_ROOT: ${NORMCHAT_STORAGE_ROOT:-/opt/normchat/storage}
      REVERB_APP_ID: ${REVERB_APP_ID:-normchat}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-normchat-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: ${REVERB_HOST:-reverb}
      REVERB_PORT: ${REVERB_PORT:-8080}
      REVERB_SCHEME: ${REVERB_SCHEME:-http}
      REVERB_SERVER_HOST: ${REVERB_SERVER_HOST:-0.0.0.0}
      REVERB_SERVER_PORT: ${REVERB_SERVER_PORT:-8080}
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-normchat_attachments}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080

  postgres:
    image: postgres:16-alpine
    container_name: normchat-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-normchat}
      POSTGRES_USER: ${DB_USERNAME:-normchat}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U normchat -d normchat"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: normchat-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
  redis_data:
  normchat_storage:
